<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — ParkEase</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div id="scroll-progress"></div>
<div id="loading-overlay"><div class="loader-ring"></div></div>
<div id="toast-container"></div>
<button id="back-to-top">↑</button>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🅿️</div>
      <h2>Welcome Back</h2>
      <p>Sign in to your ParkEase account</p>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input id="login-email" type="email" class="form-control"
               placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="login-password" type="password" class="form-control"
               placeholder="••••••••" required/>
      </div>
      <button id="login-btn" type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem">
        Sign In
      </button>
    </form>

    <div class="divider"></div>
    <p style="text-align:center;color:var(--text-muted);font-size:0.875rem">
      Don't have an account?
      <a href="/register" style="color:var(--accent);text-decoration:none;font-weight:600">Register here</a>
    </p>
    <div style="margin-top:1.25rem;background:rgba(0,212,170,0.06);border:1px solid rgba(0,212,170,0.2);border-radius:10px;padding:1rem;font-size:0.8rem;color:var(--text-muted)">
      <strong style="color:var(--accent)">Demo Credentials</strong><br/>
      Admin: admin@park.com / admin123<br/>
      User: Try registering a new account
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
