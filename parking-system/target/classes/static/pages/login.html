<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ParkEasy</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">

    <div class="auth-logo">
      <span class="icon">🚗</span>
      <h1>ParkEasy</h1>
      <p>Parking Slot Reservation System</p>
    </div>

    <div id="alert" class="alert"></div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>

    <button class="btn btn-primary btn-full" onclick="doLogin()">Login</button>

    <div class="auth-switch">
      Don't have an account? <a href="/pages/register.html">Register here</a>
    </div>

    <div class="divider"></div>
    <div class="text-muted" style="text-align:center; font-size:0.8rem;">
      Demo credentials:<br/>
      Admin: <strong>admin@parking.com</strong> / <strong>admin123</strong><br/>
      User:  <strong>user@parking.com</strong> / <strong>user123</strong>
    </div>

  </div>
</div>

<script src="/js/app.js"></script>
<script>
  // If already logged in, redirect
  if (isLoggedIn()) {
    const role = localStorage.getItem('userRole');
    window.location.href = role === 'ADMIN' ? '/pages/admin.html' : '/pages/index.html';
  }

  async function doLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      return showAlert('alert', 'Please fill in all fields.', 'error');
    }

    const data = await apiPost('/users/login', { email, password });

    if (data.error) {
      showAlert('alert', data.error, 'error');
    } else {
      saveSession(data);
      // Redirect based on role (same logic as original role-based console menu)
      window.location.href = data.role === 'ADMIN' ? '/pages/admin.html' : '/pages/index.html';
    }
  }

  // Allow pressing Enter to login
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
