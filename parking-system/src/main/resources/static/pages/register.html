<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — ParkEasy</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">

    <div class="auth-logo">
      <span class="icon">🚗</span>
      <h1>Create Account</h1>
      <p>Join ParkEasy Reservation System</p>
    </div>

    <div id="alert" class="alert"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="John Doe"/>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="9876543210"/>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>

    <div class="form-group">
      <label>Register As</label>
      <select id="role">
        <option value="USER">User</option>
        <option value="ADMIN">Admin</option>
      </select>
    </div>

    <button class="btn btn-primary btn-full" onclick="doRegister()">Create Account</button>

    <div class="auth-switch">
      Already have an account? <a href="/pages/login.html">Login here</a>
    </div>

  </div>
</div>

<script src="/js/app.js"></script>
<script>
  async function doRegister() {
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const phone    = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const role     = document.getElementById('role').value;

    if (!name || !email || !phone || !password) {
      return showAlert('alert', 'Please fill in all fields.', 'error');
    }

    const data = await apiPost('/users/register', { name, email, phone, password, role });

    if (data.error) {
      showAlert('alert', data.error, 'error');
    } else {
      showAlert('alert', 'Account created! Redirecting to login...', 'success');
      setTimeout(() => window.location.href = '/pages/login.html', 1500);
    }
  }
</script>
</body>
</html>
