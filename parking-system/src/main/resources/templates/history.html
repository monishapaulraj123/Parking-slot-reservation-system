<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My History — ParkEase</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div id="scroll-progress"></div>
<div id="loading-overlay"><div class="loader-ring"></div></div>
<div id="toast-container"></div>
<button id="back-to-top">↑</button>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-brand">🅿️ <span>Park</span>Ease</a>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/booking">Book Slot</a>
      <a href="/history" class="active">History</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">☀️</button>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Sign Out</button>
    </div>
  </div>
</nav>

<div class="container">
  <div class="section-header" style="margin-top:2rem">
    <h2>Booking History</h2>
    <p>All your past and current reservations</p>
  </div>

  <div class="glass-card" style="margin-bottom:2rem">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Slot</th>
            <th>Vehicle</th>
            <th>Date</th>
            <th>Time</th>
            <th>Amount</th>
            <th>Payment</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="history-tbody">
          <tr><td colspan="7" style="text-align:center;color:var(--text-muted)">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Feedback Section -->
  <div class="glass-card">
    <div class="section-header">
      <h2>Give Feedback</h2>
      <p>Rate your parking experience</p>
    </div>
    <form id="feedback-form" onsubmit="handleFeedback(event)" style="max-width:480px">
      <div class="form-group">
        <label class="form-label">Select Booking (Slot)</label>
        <select id="feedback-slot" class="form-control" required>
          <option value="">Loading…</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Rating (1–5 ⭐)</label>
        <select id="feedback-rating" class="form-control" required>
          <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
          <option value="4">⭐⭐⭐⭐ Good</option>
          <option value="3">⭐⭐⭐ Average</option>
          <option value="2">⭐⭐ Poor</option>
          <option value="1">⭐ Terrible</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Comment</label>
        <textarea id="feedback-comment" class="form-control" rows="3" placeholder="Share your experience…"
                  style="resize:vertical"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Submit Feedback 🌟</button>
    </form>
  </div>
</div>

<script src="/js/app.js"></script>
<script>initHistory();</script>
</body>
</html>
