<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — ParkEase</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div id="scroll-progress"></div>
<div id="loading-overlay"><div class="loader-ring"></div></div>
<div id="toast-container"></div>
<button id="back-to-top">↑</button>

<div class="auth-page">
  <div class="auth-card" style="max-width:500px">
    <div class="auth-logo">
      <div class="logo-icon">✨</div>
      <h2>Create Account</h2>
      <p>Join ParkEase and reserve your spot</p>
    </div>

    <form id="register-form" onsubmit="handleRegister(event)">
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input id="reg-name" type="text" class="form-control" placeholder="John Doe" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input id="reg-phone" type="tel" class="form-control" placeholder="+91 9876543210"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input id="reg-email" type="email" class="form-control" placeholder="you@example.com" required/>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="reg-password" type="password" class="form-control" placeholder="Min 6 chars" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input id="reg-confirm" type="password" class="form-control" placeholder="Repeat password" required/>
        </div>
      </div>
      <button id="register-btn" type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem">
        Create Account
      </button>
    </form>

    <div class="divider"></div>
    <p style="text-align:center;color:var(--text-muted);font-size:0.875rem">
      Already have an account?
      <a href="/login" style="color:var(--accent);text-decoration:none;font-weight:600">Sign in</a>
    </p>
  </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
